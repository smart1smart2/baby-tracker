name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx expo lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci
